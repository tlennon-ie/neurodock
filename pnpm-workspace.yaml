packages:
  - "packages/core"
  - "packages/repo-tooling"
  - "packages/cli"
  - "packages/extension-browser"
  - "packages/native-host"
  - "plugins/*"
  - "profiles/*"
  - "docs"
  - "examples/*"
allowBuilds:
  esbuild: true
  sharp: true
  spawn-sync: true
onlyBuiltDependencies:
  - esbuild
  - sharp
  - spawn-sync
overrides:
  "@astrojs/sitemap": "^3.7.2"
  "@astrojs/starlight>@astrojs/sitemap": "^3.7.2"
  "yaml": "^2.8.3"
  # uuid <11.1.1 is a transitive dep with a security advisory.
  # node-notifier still pulls uuid@8.3.2. Force the patched version.
  "uuid": "^11.1.1"
  # tmp <0.2.6 has a path-traversal advisory (GHSA-52f5-9888-hmc6).
  # wxt → web-ext-run still pulls tmp@0.2.5. Force the patched version.
  "tmp": "^0.2.6"
  # esbuild <0.28.1 carries two advisories: missing binary integrity
  # verification enabling RCE via NPM_CONFIG_REGISTRY (high) and a Windows
  # dev-server arbitrary file read (low). vite/wxt/wrangler/tsx still pull
  # 0.25-0.28.0. Force the patched version.
  "esbuild": ">=0.28.1"
  # shell-quote <=1.8.3 fails to escape newlines in object .op values
  # (critical). fx-runner@1.4.0 (web-ext tooling) + wrangler still pull
  # shell-quote@1.7.3. Force the patched version.
  "shell-quote": ">=1.8.4"
  # form-data <4.0.6 uses an unsafe random boundary, enabling CRLF
  # injection via unescaped multipart field names/filenames (high,
  # GHSA dependabot #53). Transitive via tooling. Force the patched version.
  "form-data": ">=4.0.6"
  # ws >=8.0.0 <8.21.0 can be driven to memory-exhaustion DoS from tiny
  # fragments/data chunks (high, dependabot #48). Transitive. Force the fix.
  "ws": ">=8.21.0"
  # dompurify carries a cluster of sanitizer-bypass advisories. The latest,
  # GHSA-cmwh-pvxp-8882 (vulnerable <=3.4.10), is fixed in 3.4.11 — so the
  # prior >=3.4.9 floor no longer covered it. Transitive. Force the patched line.
  "dompurify": ">=3.4.11"
  # @babel/core <=7.29.0 -> 7.29.6: arbitrary file read via sourceMappingURL
  # comment (low, dependabot #49). Transitive, build-time only. Caret-pinned
  # to the 7.x line (a bare >=7.29.6 resolves to the 8.0.0 major).
  "@babel/core": "^7.29.6"
  # js-yaml 4.x <4.2.0 -> 4.2.0: quadratic-complexity DoS in merge-key
  # handling (medium, dependabot #50). Scoped to the 4.x line so the
  # transitive js-yaml@3.14.2 (different major, 3.x API surface) is left
  # untouched -- forcing it to 4.x would break its 3.x-only consumers.
  "js-yaml@4": "4.2.0"
  # vite 6.x <6.4.3: server.fs.deny bypass (high #51) + launch-editor NTLMv2
  # disclosure (medium #52) on Windows. A transitive vite@6.4.2 lingers
  # beside 6.4.3/7.x/8.x; caret-pin the 6.x line to the patched release
  # (^6.4.3 stays on 6.x; the 7.x/8.x instances other tools need are left
  # alone) rather than taking the vite 7 major (dev-only, no runtime
  # benefit). Supersedes Dependabot PR #90.
  "vite@6": "^6.4.3"
