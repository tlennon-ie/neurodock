packages:
  - "packages/core"
  - "packages/cli"
  - "packages/extension-browser"
  - "packages/native-host"
  - "plugins/*"
  - "profiles/*"
  - "docs"
  - "examples/*"
allowBuilds:
  esbuild: true
  sharp: true
  spawn-sync: true
onlyBuiltDependencies:
  - esbuild
  - sharp
  - spawn-sync
overrides:
  "@astrojs/sitemap": "^3.7.2"
  "@astrojs/starlight>@astrojs/sitemap": "^3.7.2"
  "yaml": "^2.8.3"
