packages:
  - "packages/core"
  - "packages/cli"
  - "packages/extension-browser"
  - "packages/native-host"
  - "plugins/*"
  - "profiles/*"
  - "docs"
  - "examples/*"
allowBuilds:
  esbuild: true
  sharp: true
  spawn-sync: true
onlyBuiltDependencies:
  - esbuild
  - sharp
  - spawn-sync
overrides:
  "@astrojs/sitemap": "^3.7.2"
  "@astrojs/starlight>@astrojs/sitemap": "^3.7.2"
  "yaml": "^2.8.3"
  # uuid <11.1.1 is a transitive dep with a security advisory.
  # node-notifier still pulls uuid@8.3.2. Force the patched version.
  "uuid": "^11.1.1"
  # tmp <0.2.6 has a path-traversal advisory (GHSA-52f5-9888-hmc6).
  # wxt → web-ext-run still pulls tmp@0.2.5. Force the patched version.
  "tmp": "^0.2.6"
  # esbuild <0.28.1 carries two advisories: missing binary integrity
  # verification enabling RCE via NPM_CONFIG_REGISTRY (high) and a Windows
  # dev-server arbitrary file read (low). vite/wxt/wrangler/tsx still pull
  # 0.25-0.28.0. Force the patched version.
  "esbuild": ">=0.28.1"
  # shell-quote <=1.8.3 fails to escape newlines in object .op values
  # (critical). fx-runner@1.4.0 (web-ext tooling) + wrangler still pull
  # shell-quote@1.7.3. Force the patched version.
  "shell-quote": ">=1.8.4"
