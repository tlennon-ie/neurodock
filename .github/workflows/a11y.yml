name: Accessibility

on:
  pull_request:
    paths:
      - "docs/**"
      - "packages/extension-browser/**"
  workflow_dispatch:

concurrency:
  group: a11y-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe:
    name: axe-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Detect docs build
        id: probe
        run: |
          if [ -f "docs/package.json" ] && [ -f "docs/astro.config.mjs" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Docs site not yet scaffolded — exiting cleanly."
          fi

      - name: Install dependencies
        if: steps.probe.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build docs
        if: steps.probe.outputs.ready == 'true'
        run: pnpm --filter @neurodock/docs build

      - name: Run axe-core
        if: steps.probe.outputs.ready == 'true'
        run: pnpm --filter @neurodock/docs test:a11y
