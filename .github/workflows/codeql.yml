# ------------------------------------------------------------------------------
# Code scanning requires the repo to be public OR GitHub Advanced Security (paid).
# The repo is now public, so pull_request is re-enabled to give PR authors
# scanning feedback before merge. Do NOT switch to `pull_request_target` —
# that grants write-scoped GITHUB_TOKEN to forked-PR code (privilege-
# escalation trap).
# ------------------------------------------------------------------------------

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday at 06:00 UTC

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Query suite + false-positive filters live in the config file, so the
          # standing maintainability-query noise (Protocol `...` stubs) is
          # excluded without weakening security coverage.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
