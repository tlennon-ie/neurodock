# ------------------------------------------------------------------------------
# Code scanning requires the repo to be public OR GitHub Advanced Security (paid).
# This workflow is intentionally NOT run on pull_request while the repo is
# private — it would always fail at the upload-sarif step (Code Scanning API
# is unavailable for private repos without GHAS), producing a permanent red X
# on every PR.
#
# Re-enable pull_request triggers when the repo goes public (or GHAS is
# enabled) by restoring:
#
#   pull_request:
#     branches: [main]
#
# under the `on:` block below.
# ------------------------------------------------------------------------------

name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday at 06:00 UTC

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
