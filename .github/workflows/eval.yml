name: Eval

on:
  schedule:
    - cron: "0 5 * * *" # Nightly at 05:00 UTC
  pull_request:
    paths:
      - "packages/evals/**"
      - "packages/mcp-translation/**"
      - "packages/skills/**"
  workflow_dispatch:

concurrency:
  group: eval-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: Eval suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace
        run: uv sync --all-packages

      - name: Detect eval harness
        id: harness
        run: |
          if [ -f "packages/evals/pyproject.toml" ] && [ -d "packages/evals/corpora" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Eval harness or corpora not yet present — exiting cleanly."
          fi

      - name: Run eval suite
        if: steps.harness.outputs.ready == 'true'
        run: uv run python -m neurodock_evals.harness
