name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  npm:
    name: Publish TypeScript packages (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Configure npm auth
        run: |
          # Diagnostic: confirm the secret reached the runner and has the right shape.
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set"
            exit 1
          fi
          echo "Token length: ${#NPM_TOKEN}"
          echo "Token prefix: ${NPM_TOKEN:0:4}..."
          # Classic automation + granular tokens both start with 'npm_'.
          case "$NPM_TOKEN" in
            npm_*)
              echo "Token format looks correct (npm_ prefix)."
              ;;
            *)
              echo "::warning::Token does not start with 'npm_' — likely invalid or old format. Regenerate at npmjs.com/settings/<user>/tokens."
              ;;
          esac
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
          # whoami probes auth without requiring publish perms; failure here = bad token.
          npm whoami --registry=https://registry.npmjs.org/
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish via Changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: Publish Python packages (PyPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.11

      - name: Build all Python packages
        run: |
          mkdir -p dist
          for pkg in packages/mcp-* packages/clinical packages/evals; do
            if [ -f "$pkg/pyproject.toml" ]; then
              echo "Building $pkg"
              uv build --package "$(grep -m1 '^name = ' "$pkg/pyproject.toml" | cut -d'"' -f2)" --out-dir dist
            fi
          done
          echo ""
          echo "Built artefacts:"
          ls -la dist/

      - name: Publish to PyPI
        run: |
          set -e
          if [ ! -d dist ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "No artefacts in dist/ — nothing to publish."
            exit 1
          fi
          echo "Publishing $(ls dist/ | wc -l) files to PyPI (skip-existing)..."
          # --check-url skips files PyPI already has (per-file, deterministic)
          uv publish --token "$PYPI_TOKEN" --check-url https://pypi.org/simple/ dist/*
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
