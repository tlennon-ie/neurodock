name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  # changesets/action needs to read pull requests to detect a pending
  # 'Version Packages' PR vs publish-direct mode. Without this it errors
  # with 'Resource not accessible by integration' on tag-triggered runs.
  pull-requests: write

jobs:
  npm:
    name: Publish TypeScript packages (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Configure npm auth
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set"
            exit 1
          fi
          # setup-node@v6 with registry-url writes a placeholder .npmrc at
          # NPM_CONFIG_USERCONFIG (typically /home/runner/work/_temp/.npmrc).
          # npm-cli reads from that path, not $HOME/.npmrc. Overwrite it.
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "Writing .npmrc to: $NPMRC_PATH"
          {
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
            echo "always-auth=true"
          } > "$NPMRC_PATH"
          npm whoami --registry=https://registry.npmjs.org/
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # TODO: migrate to npm provenance (trusted publisher) when ready.
      # Steps required by the maintainer:
      #   1. On npmjs.com, configure a Granular Access Token with provenance
      #      publishing enabled for each @neurodock/* package, OR configure
      #      a trusted publisher (OIDC) under each package's settings.
      #   2. When using OIDC: remove NPM_TOKEN usage below and replace
      #      the publish command with: pnpm -r publish --provenance --no-git-checks --access public
      #      The id-token: write permission is already set in this workflow.
      #   3. Remove the 'Configure npm auth' step once token-auth is dropped.
      # Current path: long-lived NPM_TOKEN (kept until OIDC is configured).

      # Publish every changed package directly. changesets/action was
      # used previously but it computes a Version-PR base branch from
      # GITHUB_REF_NAME, which on tag pushes becomes 'refs/tags/v0.2.3'
      # (with slashes) and the GitHub PR API rejects it as an invalid
      # base. Tag-triggered releases just need 'publish' — no PR ever
      # gets opened from a tag push anyway. Direct pnpm publish is
      # simpler and avoids that action's branch-trigger assumption.
      - name: Publish packages to npm
        run: |
          set -e
          echo "Publishing every workspace package whose version is not yet on npm."
          # 'pnpm -r publish' walks every workspace package, skips
          # private:true, and skips already-published versions cleanly.
          # --no-git-checks because we're on a detached HEAD (tag), not
          # a branch. --access public for scoped packages (@neurodock/*).
          pnpm -r publish --no-git-checks --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: Publish Python packages (PyPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.11

      - name: Build all Python packages
        run: |
          mkdir -p dist
          for pkg in packages/mcp-* packages/clinical packages/evals; do
            if [ -f "$pkg/pyproject.toml" ]; then
              echo "Building $pkg"
              uv build --package "$(grep -m1 '^name = ' "$pkg/pyproject.toml" | cut -d'"' -f2)" --out-dir dist
            fi
          done
          echo ""
          echo "Built artefacts:"
          ls -la dist/

      # TODO: migrate to PyPI trusted publisher (OIDC) when ready.
      # Steps required by the maintainer:
      #   1. On pypi.org, go to each package → Manage → Publishing → Add a
      #      new trusted publisher: GitHub Actions, repo tlennon-ie/neurodock,
      #      workflow release.yml, environment (leave blank or match below).
      #   2. When configured: remove PYPI_TOKEN usage below and replace
      #      the uv publish call with: uv publish --trusted-publisher "$f"
      #      The id-token: write permission is already set in this workflow.
      #   3. Remove the PYPI_TOKEN env var once OIDC is the only path.
      # Current path: long-lived PYPI_TOKEN (kept until OIDC is configured).
      - name: Publish to PyPI
        run: |
          if [ ! -d dist ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "No artefacts in dist/ — nothing to publish."
            exit 1
          fi
          echo "Publishing $(ls dist/ | wc -l) files to PyPI one-by-one..."
          # Per-file loop with continue-on-error so a 429 on a new project
          # does not block existing-project version bumps later in the glob.
          # --check-url short-circuits already-published files cleanly.
          failed=0
          published=0
          skipped=0
          for f in dist/*; do
            name=$(basename "$f")
            if uv publish --token "$PYPI_TOKEN" --check-url https://pypi.org/simple/ "$f" 2>&1 | tee /tmp/uvp.log; then
              if grep -q "already exists, skipping" /tmp/uvp.log; then
                skipped=$((skipped+1))
              else
                published=$((published+1))
              fi
            else
              echo "::warning::Failed to publish $name (likely PyPI rate limit on new project)"
              failed=$((failed+1))
            fi
          done
          echo ""
          echo "PyPI summary: $published published, $skipped already-existed, $failed failed"
          if [ "$failed" -gt 0 ] && [ "$published" -eq 0 ] && [ "$skipped" -eq 0 ]; then
            echo "::error::No files published or skipped — every upload failed."
            exit 1
          fi
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  mcp-registry:
    name: Publish to MCP Registry
    # Runs after PyPI: the registry verifies each package's ownership via the
    # `mcp-name:` marker in the *published* PyPI README, so the new versions
    # must be on PyPI first (ADR 0008 / 0009).
    needs: [pypi]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC auth to the MCP Registry for io.github.tlennon-ie/*
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher --help >/dev/null

      # GitHub Actions OIDC — no browser, no stored secret. The token's audience
      # is derived from the default registry URL; id-token: write is required.
      - name: Authenticate (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish each server.json
        run: |
          set -u
          published=0; skipped=0; failed=0
          # Matches the 5 stdio servers (packages/mcp-*) and the hosted remote
          # server (packages/remote, a `remotes` entry — no PyPI package needed).
          for sj in packages/*/server.json; do
            pkg_dir=$(dirname "$sj")
            # Keep server.json in lockstep with the package's pyproject version.
            # For the remote server this updates only .version (it has no .packages).
            ver=$(grep -m1 '^version = ' "$pkg_dir/pyproject.toml" | cut -d'"' -f2)
            tmp=$(mktemp)
            jq --arg v "$ver" '.version = $v | (.packages[]?.version) |= $v' "$sj" > "$tmp" && mv "$tmp" "$sj"
            echo "::group::publish $sj ($ver)"
            if ./mcp-publisher publish "$sj" 2>&1 | tee /tmp/pub.log; then
              published=$((published + 1))
            elif grep -qiE "already (exists|published)|version .* exists" /tmp/pub.log; then
              echo "already published — skipping"
              skipped=$((skipped + 1))
            else
              echo "::warning::failed to publish $sj"
              failed=$((failed + 1))
            fi
            echo "::endgroup::"
          done
          echo "MCP registry: $published published, $skipped already-present, $failed failed"
          if [ "$failed" -gt 0 ] && [ "$published" -eq 0 ] && [ "$skipped" -eq 0 ]; then
            echo "::error::every registry publish failed"
            exit 1
          fi

  mcpb-bundles:
    name: Attach Claude Desktop bundles (.mcpb)
    # Runs after PyPI so the bundles are only attached to a release whose
    # underlying servers actually published. The bundles themselves are thin
    # `uvx neurodock-mcp-<server>` launchers (no embedded code), so packing
    # them needs only Node — but we gate on a successful publish.
    needs: [pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release for the v* tag + upload assets
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate and pack .mcpb bundles
        run: |
          set -e
          mkdir -p dist
          for s in chronometric cognitive-graph guardrail task-fractionator translation; do
            dir="mcpb/neurodock-mcp-$s"
            npx --yes @anthropic-ai/mcpb validate "$dir/manifest.json"
            npx --yes @anthropic-ai/mcpb pack "$dir" "dist/neurodock-mcp-$s.mcpb"
          done
          echo "Packed bundles:"
          ls -la dist/*.mcpb

      # Creates (or updates) the GitHub Release for the triggering v* tag and
      # attaches the five Claude Desktop bundles. v* tags previously produced
      # no GitHub Release at all — only npm/PyPI/registry publishes.
      - name: Attach bundles to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.mcpb
          fail_on_unmatched_files: true
          generate_release_notes: true
