name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  # changesets/action needs to read pull requests to detect a pending
  # 'Version Packages' PR vs publish-direct mode. Without this it errors
  # with 'Resource not accessible by integration' on tag-triggered runs.
  pull-requests: write

jobs:
  npm:
    name: Publish TypeScript packages (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.1.2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Configure npm auth
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set"
            exit 1
          fi
          # setup-node@v6 with registry-url writes a placeholder .npmrc at
          # NPM_CONFIG_USERCONFIG (typically /home/runner/work/_temp/.npmrc).
          # npm-cli reads from that path, not $HOME/.npmrc. Overwrite it.
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "Writing .npmrc to: $NPMRC_PATH"
          {
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
            echo "always-auth=true"
          } > "$NPMRC_PATH"
          npm whoami --registry=https://registry.npmjs.org/
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish via Changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: Publish Python packages (PyPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.11

      - name: Build all Python packages
        run: |
          mkdir -p dist
          for pkg in packages/mcp-* packages/clinical packages/evals; do
            if [ -f "$pkg/pyproject.toml" ]; then
              echo "Building $pkg"
              uv build --package "$(grep -m1 '^name = ' "$pkg/pyproject.toml" | cut -d'"' -f2)" --out-dir dist
            fi
          done
          echo ""
          echo "Built artefacts:"
          ls -la dist/

      - name: Publish to PyPI
        run: |
          if [ ! -d dist ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "No artefacts in dist/ — nothing to publish."
            exit 1
          fi
          echo "Publishing $(ls dist/ | wc -l) files to PyPI one-by-one..."
          # Per-file loop with continue-on-error so a 429 on a new project
          # does not block existing-project version bumps later in the glob.
          # --check-url short-circuits already-published files cleanly.
          failed=0
          published=0
          skipped=0
          for f in dist/*; do
            name=$(basename "$f")
            if uv publish --token "$PYPI_TOKEN" --check-url https://pypi.org/simple/ "$f" 2>&1 | tee /tmp/uvp.log; then
              if grep -q "already exists, skipping" /tmp/uvp.log; then
                skipped=$((skipped+1))
              else
                published=$((published+1))
              fi
            else
              echo "::warning::Failed to publish $name (likely PyPI rate limit on new project)"
              failed=$((failed+1))
            fi
          done
          echo ""
          echo "PyPI summary: $published published, $skipped already-existed, $failed failed"
          if [ "$failed" -gt 0 ] && [ "$published" -eq 0 ] && [ "$skipped" -eq 0 ]; then
            echo "::error::No files published or skipped — every upload failed."
            exit 1
          fi
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
