[project]
name = "neurodock-state"
version = "0.0.1"
description = "NeuroDock per-user state foundation — identity, session, profile, and graph backing abstractions (ADR 0010 Phase B)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "NeuroDock contributors" }]
dependencies = [
    "fastmcp>=3.3.0",
]

[project.urls]
Homepage = "https://neurodock.org/"
Documentation = "https://docs.neurodock.org/"
Repository = "https://github.com/tlennon-ie/neurodock"
Issues = "https://github.com/tlennon-ie/neurodock/issues"

[project.optional-dependencies]
test = [
    "pytest>=8.3.0",
    "pytest-asyncio>=1.3.0",
]
# ADR 0010 Phase D — the Clerk-metadata BYOS store. Both are imported lazily
# inside `clerk_byos_store`, so the base package stays dependency-light and
# importable without them; the hosted image installs this extra
# (`neurodock-state[clerk]`). `cryptography` encrypts the BYOS auth token at rest.
clerk = [
    "clerk-backend-api>=2.0",
    "cryptography>=42.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neurodock_state"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
