[project]
name = "neurodock-mcp-cognitive-graph"
version = "0.0.5"
description = "NeuroDock cognitive graph MCP server — persistent entity memory and recall."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "NeuroDock contributors" }]
dependencies = [
    "mcp>=1.0.0",
    "pydantic>=2.7",
    "pyyaml>=6.0",
    # v0.0.2 — embedding-based fuzzy recall. Both are local-only; fastembed
    # caches its model files under the user's HF cache after first download
    # and does NOT call out to the network on subsequent runs.
    "rapidfuzz>=3.10",
    "fastembed>=0.4",
    "numpy>=1.26",
]

[project.urls]
Homepage = "https://neurodock.org/"
Documentation = "https://docs.neurodock.org/"
Repository = "https://github.com/tlennon-ie/neurodock"
Issues = "https://github.com/tlennon-ie/neurodock/issues"
Changelog = "https://github.com/tlennon-ie/neurodock/blob/main/packages/mcp-cognitive-graph/CHANGELOG.md"

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "jsonschema>=4.0",
]
# sqlite-vec is a recommended-but-optional dependency. When present the
# embedding rung uses a vec0 virtual table for similarity search; absent
# that, the same algorithm runs in pure NumPy. Both code paths produce
# identical resolution results.
vec = [
    "sqlite-vec>=0.1.6",
]

[project.scripts]
neurodock-mcp-cognitive-graph = "neurodock_mcp_cognitive_graph.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neurodock_mcp_cognitive_graph"]

[tool.hatch.build.targets.wheel.force-include]
"src/neurodock_mcp_cognitive_graph/migrations/0001_init.sql" = "neurodock_mcp_cognitive_graph/migrations/0001_init.sql"
"src/neurodock_mcp_cognitive_graph/migrations/0002_embeddings.sql" = "neurodock_mcp_cognitive_graph/migrations/0002_embeddings.sql"
