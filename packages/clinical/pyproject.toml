[project]
name = "neurodock-clinical"
version = "0.0.0"
description = "NeuroDock clinical guardrail detector library — importable from the guardrail MCP server and other surfaces."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "NeuroDock contributors" }]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neurodock_clinical"]
