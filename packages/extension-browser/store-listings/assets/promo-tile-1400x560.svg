<?xml version="1.0" encoding="UTF-8"?>
<!--
  NeuroDock — Chrome marquee promo tile (also reused as Edge tile).
  Spec: 1400 x 560 (Chrome Web Store marquee promo tile; Edge tile image).
  Visual language matches docs/public/og-image.svg.
  Rasterise to PNG at 1400x560 before upload.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1400 560"
  width="1400"
  height="560"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">NeuroDock — Translate</title>
  <desc id="desc">
    NeuroDock, a translator for workplace messages for neurodivergent
    professionals. Local-first by default.
  </desc>

  <rect width="1400" height="560" fill="#f8f7f2" />
  <rect x="48" y="48" width="1304" height="464" fill="none" stroke="#d8d6cf" stroke-width="1" />

  <text
    x="120"
    y="240"
    font-family="'Lexend', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="120"
    font-weight="600"
    letter-spacing="-2"
    fill="#1d2030"
  >
    NeuroDock
  </text>

  <rect x="120" y="276" width="140" height="4" fill="#5a6a8f" />

  <text
    x="120"
    y="356"
    font-family="'Atkinson Hyperlegible', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="38"
    font-weight="400"
    fill="#33384a"
  >
    Translate workplace messages for neurodivergent professionals.
  </text>
  <text
    x="120"
    y="404"
    font-family="'Atkinson Hyperlegible', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="38"
    font-weight="400"
    fill="#33384a"
  >
    Local-first by default. Cloud only with your consent.
  </text>

  <text
    x="120"
    y="488"
    font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="20"
    font-weight="400"
    fill="#5a6075"
    letter-spacing="0.5"
  >
    open source  ·  AGPL-3.0  ·  community-run
  </text>

  <text
    x="1280"
    y="488"
    text-anchor="end"
    font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    font-size="20"
    font-weight="400"
    fill="#5a6075"
  >
    github.com/tlennon-ie/neurodock
  </text>
</svg>
