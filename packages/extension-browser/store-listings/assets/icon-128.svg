<?xml version="1.0" encoding="UTF-8"?>
<!--
  NeuroDock — 128px extension icon (placeholder).
  Spec: 128 x 128 (Chrome/Edge/Firefox default icon size).
  Visual language matches docs/public/og-image.svg:
    * Single neutral accent (#5a6a8f).
    * No gradients, no animation, no remote fonts.
    * Recognisable at 16px and 48px — keep the mark simple.
  The mark is a stylised "N" with a hairline underline that recalls the
  accent rule used across promo tiles and the OG image.
  Rasterise to PNG at 128x128 and place at packages/extension-browser/public/icon/128.png.
  Also generate 16, 32, 48px PNGs from the same source for the manifest.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  width="128"
  height="128"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">NeuroDock</title>
  <desc id="desc">
    NeuroDock extension icon — a stylised letter N over a neutral accent rule.
  </desc>

  <rect width="128" height="128" rx="20" ry="20" fill="#f8f7f2" />
  <rect x="6" y="6" width="116" height="116" rx="16" ry="16" fill="none" stroke="#d8d6cf" stroke-width="1.5" />

  <!-- Stylised N. Heavy verticals, single diagonal. Hairline cap. -->
  <g fill="#1d2030">
    <rect x="32" y="34" width="10" height="60" />
    <rect x="86" y="34" width="10" height="60" />
    <polygon points="42,34 52,34 96,94 86,94" />
  </g>

  <!-- Accent rule under the wordmark. Matches OG image and promo tiles. -->
  <rect x="32" y="100" width="64" height="3" fill="#5a6a8f" />
</svg>
