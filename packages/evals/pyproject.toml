[project]
name = "neurodock-evals"
version = "0.0.1"
description = "NeuroDock eval corpora and harness — versioned datasets for translation, skills, and guardrails."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "NeuroDock contributors" }]
dependencies = [
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "jsonschema>=4.21",
    "neurodock-mcp-translation",
]

[project.optional-dependencies]
test = [
    "pytest>=8.3.0",
    "pytest-asyncio>=1.3.0",
]

[project.scripts]
neurodock-evals = "neurodock_evals.harness:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neurodock_evals"]

[tool.uv.sources]
neurodock-mcp-translation = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"

# Module-level mypy overrides. `jsonschema` does not ship type stubs in our pin,
# and the sibling `neurodock_mcp_translation` package does not yet emit a
# `py.typed` marker. We accept the missing-imports for those two until the
# upstream packages publish stubs.
[[tool.mypy.overrides]]
module = "jsonschema.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "neurodock_mcp_translation.*"
ignore_missing_imports = true
