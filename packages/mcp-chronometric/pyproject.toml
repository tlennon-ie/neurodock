[project]
name = "neurodock-mcp-chronometric"
version = "0.0.3"
description = "NeuroDock chronometric MCP server — time, idle, and break management."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "NeuroDock contributors" }]
dependencies = [
    "fastmcp>=3.3.0",
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "tzdata>=2024.1; sys_platform == 'win32'",
]

[project.urls]
Homepage = "https://neurodock.org/"
Documentation = "https://docs.neurodock.org/"
Repository = "https://github.com/tlennon-ie/neurodock"
Issues = "https://github.com/tlennon-ie/neurodock/issues"
Changelog = "https://github.com/tlennon-ie/neurodock/blob/main/packages/mcp-chronometric/CHANGELOG.md"

[project.optional-dependencies]
test = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "jsonschema>=4.21.0",
]

[project.scripts]
neurodock-mcp-chronometric = "neurodock_mcp_chronometric.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neurodock_mcp_chronometric"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
