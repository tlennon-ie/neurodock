[project]
name = "neurodock-mcp-task-fractionator"
version = "0.0.0"
description = "NeuroDock task fractionator MCP server — goal decomposition and next-action selection."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "NeuroDock contributors" }]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neurodock_mcp_task_fractionator"]
