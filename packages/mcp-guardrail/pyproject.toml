[project]
name = "neurodock-mcp-guardrail"
version = "0.0.2"
description = "NeuroDock guardrail MCP server — rumination, hyperfocus, and sycophancy detection."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "NeuroDock contributors" }]
dependencies = [
    "fastmcp>=3.3.0",
    "pydantic>=2.7",
]

[project.optional-dependencies]
test = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "jsonschema>=4.21.0",
]

[project.scripts]
neurodock-mcp-guardrail = "neurodock_mcp_guardrail.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neurodock_mcp_guardrail"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
