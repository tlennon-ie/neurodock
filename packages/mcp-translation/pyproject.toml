[project]
name = "neurodock-mcp-translation"
version = "0.0.0"
description = "NeuroDock translation MCP server — tone and literal-translation prompts shared with the browser extension."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "NeuroDock contributors" }]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neurodock_mcp_translation"]
