[project]
name = "neurodock-mcp-translation"
version = "0.2.2"
description = "NeuroDock translation MCP server — deterministic baseline analysis plus structured LLM-refinement prompts for incoming/outgoing message decoding and meeting briefing."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
authors = [{ name = "NeuroDock contributors" }]
dependencies = [
    "fastmcp>=3.3.0",
    "pydantic>=2.7",
]

[project.urls]
Homepage = "https://neurodock.org/"
Documentation = "https://docs.neurodock.org/"
Repository = "https://github.com/tlennon-ie/neurodock"
Issues = "https://github.com/tlennon-ie/neurodock/issues"
Changelog = "https://github.com/tlennon-ie/neurodock/blob/main/packages/mcp-translation/CHANGELOG.md"

[project.optional-dependencies]
test = [
    "pytest>=8.3.0",
    "pytest-asyncio>=1.3.0",
    "jsonschema>=4.21.0",
]

[project.scripts]
neurodock-mcp-translation = "neurodock_mcp_translation.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# `prompts/` is a subpackage (it has __init__.py), so `packages` already bundles
# it AND its .prompt.md data files. A force-include of the same dir would add
# every file twice and fail the wheel build on newer hatchling
# ("a second file is being added to the wheel archive at the same path").
packages = ["src/neurodock_mcp_translation"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
